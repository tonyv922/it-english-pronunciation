<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 英文發音學習器</title>
    <style>
        body {
            background-color: #2b2b2b;
            color: #ffffff;
            font-family: "微軟正黑體", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
            color: #ffffff;
        }
        /* 模式切換按鈕區 */
        .mode-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-mode {
            background-color: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-mode.active {
            background-color: #28a745; /* 啟用時顯示綠色 */
            border-color: #28a745;
            font-weight: bold;
        }
        
        select {
            font-size: 18px;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            background-color: #444444;
            color: #ffffff;
            border: 1px solid #666;
            cursor: pointer;
            width: 320px;
            text-align: center;
        }
        .translation {
            font-size: 24px;
            color: #a9b7c6;
            margin-bottom: 30px;
            text-align: center;
            min-height: 35px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            font-size: 18px;
            padding: 12px 24px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-play { background-color: #0078D7; }
        .btn-play:hover { background-color: #005A9E; }
        .btn-mic { background-color: #d83b01; }
        .btn-mic:hover { background-color: #a82e00; }
        .btn-mic:disabled { background-color: #666; cursor: not-allowed; }
        
        #feedbackResult {
            font-size: 20px;
            font-weight: bold;
            height: 30px; 
            margin-top: 10px;
            text-align: center;
        }
        .correct { color: #4CAF50; } 
        .wrong { color: #FF5252; }   
        .listening { color: #FFC107; } 

        .hint {
            margin-top: 30px;
            font-size: 14px;
            color: #888888;
            line-height: 1.8;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>專業術語發音練習</h1>

    <div class="mode-group">
        <button id="btnWordMode" class="btn-mode active" onclick="switchMode('word')">📚 基礎單字</button>
        <button id="btnSentenceMode" class="btn-mode" onclick="switchMode('sentence')">📅 每日 5 句</button>
    </div>

    <select id="wordSelect" onchange="updateTranslation()"></select>

    <div class="translation" id="translationDisplay"></div>

    <div class="button-group">
        <button class="btn-play" onclick="playPronunciation()">🔊 播放發音</button>
        <button class="btn-mic" id="btnMic" onclick="startListening()">🎙️ 換我唸唸看</button>
    </div>

    <div id="feedbackResult"></div>

    <div class="hint">
        💡 <b>操作提示：</b><br>
        切換單字/句子：按 <b>↑</b> <b>↓</b> 方向鍵<br>
        播放發音：按 <b>Enter</b> 或 <b>空白鍵</b><br>
        麥克風測驗：按 <b>R 鍵</b>
    </div>

    <script>
        // --- 字典庫 ---
        const vocabList = {
            "Server": "伺服器",
            "Database": "資料庫",
            "Hardware": "硬體",
            "Network": "網路",
            "Bandwidth": "頻寬",
            "Latency": "延遲",
            "Deployment": "部署",
            "Infrastructure": "基礎架構",
            "Configuration": "配置 / 設定"
        };

        // 簡短、實用的 IT 句子庫
        const sentenceDB = [
            {"en": "Restart the server.", "zh": "重新啟動伺服器。"},
            {"en": "Check the network cable.", "zh": "檢查網路線。"},
            {"en": "The system is down.", "zh": "系統停機了。"},
            {"en": "Back up the data.", "zh": "備份資料。"},
            {"en": "Clear the cache.", "zh": "清除快取。"},
            {"en": "Install new hardware.", "zh": "安裝新硬體。"},
            {"en": "Update the software.", "zh": "更新軟體。"},
            {"en": "Log in as admin.", "zh": "以管理員身分登入。"},
            {"en": "Ping the IP address.", "zh": "Ping 這個 IP 位址。"},
            {"en": "The database is full.", "zh": "資料庫已滿。"},
            {"en": "Fix the error code.", "zh": "修復錯誤代碼。"},
            {"en": "Save the log file.", "zh": "儲存日誌檔案。"},
            {"en": "The CPU is too hot.", "zh": "處理器溫度過高。"},
            {"en": "Replace the hard drive.", "zh": "更換硬碟。"},
            {"en": "Check the power supply.", "zh": "檢查電源供應器。"}
        ];

        let currentDict = vocabList; // 當前正在使用的字典 (預設為單字)

        const selectElement = document.getElementById('wordSelect');
        const translationDisplay = document.getElementById('translationDisplay');
        const feedbackResult = document.getElementById('feedbackResult');
        const btnMic = document.getElementById('btnMic');

        // --- 核心功能：切換模式 ---
        function switchMode(mode) {
            document.getElementById('btnWordMode').classList.remove('active');
            document.getElementById('btnSentenceMode').classList.remove('active');
            
            if (mode === 'word') {
                document.getElementById('btnWordMode').classList.add('active');
                currentDict = vocabList;
            } else if (mode === 'sentence') {
                document.getElementById('btnSentenceMode').classList.add('active');
                currentDict = getDailySentences(); // 取得今天的 5 個句子
            }
            
            renderSelectOptions();
        }

        // --- 核心功能：計算今天的 5 個句子 ---
        function getDailySentences() {
            // 利用今天的日期產生一個固定的數字，確保同一天選出來的句子是一樣的
            const today = new Date();
            const daySeed = today.getFullYear() * 1000 + today.getMonth() * 31 + today.getDate();
            
            // 根據日期的 seed 計算要從第幾個句子開始抓取
            const startIndex = (daySeed * 5) % sentenceDB.length;
            
            let dailyDict = {};
            for(let i = 0; i < 5; i++) {
                let index = (startIndex + i) % sentenceDB.length;
                let item = sentenceDB[index];
                dailyDict[item.en] = item.zh;
            }
            return dailyDict;
        }

        // --- 重新渲染下拉選單 ---
        function renderSelectOptions() {
            selectElement.innerHTML = ''; // 先清空目前的選項
            for (let text in currentDict) {
                let option = document.createElement('option');
                option.value = text;
                option.textContent = text;
                selectElement.appendChild(option);
            }
            updateTranslation(); // 更新翻譯與清空回饋
        }

        function updateTranslation() {
            const selectedText = selectElement.value;
            translationDisplay.textContent = currentDict[selectedText];
            feedbackResult.textContent = ""; 
        }

        // --- 語音發音 ---
        function playPronunciation() {
            const textToSpeak = selectElement.value;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.8;     
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- 語音辨識 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; 
            recognition.interimResults = false; 
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                btnMic.disabled = true;
                btnMic.textContent = "👂 正在聽你說...";
                feedbackResult.textContent = "請對著麥克風唸...";
                feedbackResult.className = "listening";
            };

            recognition.onresult = function(event) {
                let spokenWord = event.results[0][0].transcript;
                let targetWord = selectElement.value;

                // 去除標點符號與轉小寫進行比對
                let cleanSpoken = spokenWord.toLowerCase().replace(/[^a-z0-9]/g, '');
                let cleanTarget = targetWord.toLowerCase().replace(/[^a-z0-9]/g, '');

                if (cleanSpoken === cleanTarget) {
                    feedbackResult.textContent = `✅ 太棒了！發音非常標準！`;
                    feedbackResult.className = "correct";
                } else {
                    feedbackResult.textContent = `❌ 系統聽到： "${spokenWord}"，再試一次吧！`;
                    feedbackResult.className = "wrong";
                }
            };

            recognition.onend = function() {
                btnMic.disabled = false;
                btnMic.textContent = "🎙️ 換我唸唸看";
            };

            recognition.onerror = function(event) {
                feedbackResult.textContent = `⚠️ 麥克風發生錯誤：${event.error}`;
                feedbackResult.className = "wrong";
                btnMic.disabled = false;
                btnMic.textContent = "🎙️ 換我唸唸看";
            };
        } else {
            btnMic.style.display = 'none';
            feedbackResult.textContent = "您的瀏覽器不支援語音辨識，請使用 Chrome 或 Edge。";
            feedbackResult.className = "wrong";
        }

        function startListening() {
            if (recognition) {
                recognition.start();
            }
        }

        // --- 鍵盤操作 ---
        document.addEventListener('keydown', function(event) {
            const maxIndex = selectElement.options.length - 1;
            let currentIndex = selectElement.selectedIndex;

            if (event.key === 'ArrowUp') {
                event.preventDefault(); 
                if (currentIndex > 0) {
                    selectElement.selectedIndex = currentIndex - 1;
                    updateTranslation(); 
                }
            } else if (event.key === 'ArrowDown') {
                event.preventDefault(); 
                if (currentIndex < maxIndex) {
                    selectElement.selectedIndex = currentIndex + 1;
                    updateTranslation(); 
                }
            } else if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault(); 
                playPronunciation(); 
            } else if (event.key.toLowerCase() === 'r') {
                event.preventDefault();
                if (!btnMic.disabled) {
                    startListening();
                }
            }
        });

        // 啟動時先初始化一次選項
        renderSelectOptions();
    </script>

</body>
</html>
