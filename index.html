<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多益英文發音學習器 (AI 自動出題)</title>
    <style>
        /* 深色模式外觀設定 */
        body {
            background-color: #2b2b2b;
            color: #ffffff;
            font-family: "微軟正黑體", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
            color: #ffffff;
        }
        select {
            font-size: 18px;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            background-color: #444444;
            color: #ffffff;
            border: 1px solid #666;
            cursor: pointer;
            width: 350px;
            text-align: center;
        }
        .translation {
            font-size: 24px;
            color: #a9b7c6;
            margin-bottom: 30px;
            text-align: center;
            min-height: 35px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            font-size: 18px;
            padding: 12px 24px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-play { background-color: #0078D7; }
        .btn-play:hover { background-color: #005A9E; }
        .btn-mic { background-color: #d83b01; }
        .btn-mic:hover { background-color: #a82e00; }
        .btn-mic:disabled { background-color: #666; cursor: not-allowed; }
        
        /* 辨識結果的樣式 */
        #feedbackResult {
            font-size: 20px;
            font-weight: bold;
            height: 30px; 
            margin-top: 10px;
            text-align: center;
        }
        .correct { color: #4CAF50; } 
        .wrong { color: #FF5252; }   
        .listening { color: #FFC107; } 

        .hint {
            margin-top: 30px;
            font-size: 14px;
            color: #888888;
            line-height: 1.8;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>多益發音實戰演練</h1>

    <select id="wordSelect" onchange="updateTranslation()">
        <option>準備連線中...</option>
    </select>

    <div class="translation" id="translationDisplay"></div>

    <div class="button-group">
        <button class="btn-play" onclick="playPronunciation()">🔊 播放發音</button>
        <button class="btn-mic" id="btnMic" onclick="startListening()">🎙️ 換我唸唸看</button>
    </div>

    <div id="feedbackResult"></div>

    <div class="hint">
        💡 <b>操作提示：</b><br>
        切換單字/句子：按 <b>↑</b> <b>↓</b> 方向鍵<br>
        播放發音：按 <b>Enter</b> 或 <b>空白鍵</b><br>
        麥克風測驗：按 <b>R 鍵</b><br><br>
        <button onclick="resetApiKey()" style="font-size: 12px; padding: 5px 10px; background-color: #555;">更換 API Key</button>
    </div>

    <script>
        let currentDict = {};
        const selectElement = document.getElementById('wordSelect');
        const translationDisplay = document.getElementById('translationDisplay');
        const feedbackResult = document.getElementById('feedbackResult');
        const btnMic = document.getElementById('btnMic');

        // --- 核心功能：呼叫 AI 自動產生多益題庫 ---
        async function fetchFromAI() {
            let apiKey = localStorage.getItem('myGeminiApiKey');
            
            if (!apiKey) {
                apiKey = prompt("請輸入你的 Gemini API Key 來啟用自動出題功能：\n(這只會儲存在你現在這台電腦的瀏覽器中)");
                if (!apiKey) {
                    selectElement.innerHTML = '<option>未輸入 API Key，無法載入</option>';
                    translationDisplay.textContent = "請重新整理網頁並輸入 Key";
                    return;
                }
                localStorage.setItem('myGeminiApiKey', apiKey); 
            }

            selectElement.innerHTML = '<option>🧠 AI 正在為您產生今日專屬題庫...</option>';
            translationDisplay.textContent = "請稍候...";

            // AI 指令：針對多益初階程度
            const aiPrompt = "從歷年多益(TOEIC)測驗的高頻必考單字中，隨機挑選5個適合初階程度（約多益 200 分水準）的基礎英文單字或實用短句。請直接回傳純JSON陣列格式，不要任何Markdown標記，格式範例：[{\"en\": \"Schedule\", \"zh\": \"行程表 / 安排\"}]";

            try {
                // 自動清除 API Key 前後不小心複製到的空白鍵
                const cleanApiKey = apiKey.trim();

                // 使用最新的模型 endpoint
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${cleanApiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: aiPrompt }] }]
                    })
                });

                if (!response.ok) {
                    const errorDetail = await response.text();
                    throw new Error(`API 請求失敗，狀態碼: ${response.status}, 詳情: ${errorDetail}`);
                }

                const data = await response.json();
                let aiText = data.candidates[0].content.parts[0].text;
                
                // 清理多餘的標記並轉換成陣列
                aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
                const aiData = JSON.parse(aiText);

                currentDict = {};
                aiData.forEach(item => {
                    currentDict[item.en] = item.zh;
                });

                renderSelectOptions();

            } catch (error) {
                console.error("詳細錯誤資訊：", error);
                selectElement.innerHTML = '<option>⚠️ 載入失敗，請檢查 Key 或網路</option>';
                translationDisplay.textContent = "請點擊下方按鈕重新輸入 API Key";
                // 發生錯誤時清除無效的 Key
                localStorage.removeItem('myGeminiApiKey'); 
            }
        }

        // --- 重設 API Key 功能 ---
        function resetApiKey() {
            localStorage.removeItem('myGeminiApiKey');
            location.reload(); 
        }

        // --- 渲染下拉選單 ---
        function renderSelectOptions() {
            selectElement.innerHTML = ''; 
            for (let text in currentDict) {
                let option = document.createElement('option');
                option.value = text;
                option.textContent = text;
                selectElement.appendChild(option);
            }
            updateTranslation(); 
        }

        function updateTranslation() {
            const selectedText = selectElement.value;
            translationDisplay.textContent = currentDict[selectedText];
            feedbackResult.textContent = ""; 
        }

        // --- 播放發音 ---
        function playPronunciation() {
            const textToSpeak = selectElement.value;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'en-US'; 
                utterance.rate = 0.8;     
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- 語音辨識 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US'; 
            recognition.interimResults = false; 
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                btnMic.disabled = true;
                btnMic.textContent = "👂 正在聽你說...";
                feedbackResult.textContent = "請對著麥克風唸...";
                feedbackResult.className = "listening";
            };

            recognition.onresult = function(event) {
                let spokenWord = event.results[0][0].transcript;
                let targetWord = selectElement.value;
                let cleanSpoken = spokenWord.toLowerCase().replace(/[^a-z0-9]/g, '');
                let cleanTarget = targetWord.toLowerCase().replace(/[^a-z0-9]/g, '');

                if (cleanSpoken === cleanTarget) {
                    feedbackResult.textContent = `✅ 太棒了！發音非常標準！`;
                    feedbackResult.className = "correct";
                } else {
                    feedbackResult.textContent = `❌ 系統聽到： "${spokenWord}"，再試一次吧！`;
                    feedbackResult.className = "wrong";
                }
            };

            recognition.onend = function() {
                btnMic.disabled = false;
                btnMic.textContent = "🎙️ 換我唸唸看";
            };
        } else {
            btnMic.style.display = 'none';
        }

        function startListening() { if (recognition) recognition.start(); }

        // --- 鍵盤操作 ---
        document.addEventListener('keydown', function(event) {
            const maxIndex = selectElement.options.length - 1;
            let currentIndex = selectElement.selectedIndex;
            
            // 避免在輸入 API Key 的對話框按到快捷鍵
            if (document.activeElement.tagName === 'INPUT') return;

            if (event.key === 'ArrowUp') {
                event.preventDefault(); 
                if (currentIndex > 0) { selectElement.selectedIndex = currentIndex - 1; updateTranslation(); }
            } else if (event.key === 'ArrowDown') {
                event.preventDefault(); 
                if (currentIndex < maxIndex) { selectElement.selectedIndex = currentIndex + 1; updateTranslation(); }
            } else if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault(); playPronunciation(); 
            } else if (event.key.toLowerCase() === 'r') {
                event.preventDefault(); if (!btnMic.disabled) startListening();
            }
        });

        // 啟動時執行
        fetchFromAI();
    </script>

</body>
</html>
